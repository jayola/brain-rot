
<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #FF00F5; font-family: 'Arial Black', sans-serif; text-align: center; overflow: hidden; margin: 0; }
        .score { font-size: 40px; color: white; -webkit-text-stroke: 2px black; margin-top: 20px; }
        
        #aura { font-size: 120px; cursor: pointer; transition: 0.1s; display: inline-block; margin-top: 50px; user-select: none; }
        #aura:active { transform: scale(1.3) rotate(5deg); }

        .floating-text { 
            position: absolute; 
            color: #00FF41; /* Bright Green for contrast */
            font-size: 30px;
            font-weight: 900; 
            -webkit-text-stroke: 1.5px black; /* Black outline makes it readable */
            pointer-events: none; 
            animation: fly 2s ease-out forwards; /* Slower animation (2 seconds) */
            white-space: nowrap;
        }

        @keyframes fly { 
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-200px) scale(1.5); opacity: 0; } 
        }
    </style>
</head>
<body>
    <div class="score">AURA: <span id="val">0</span></div>
    <div id="aura" onclick="clickGame(event)">💀</div>

    <script>
        let score = 0;
        function clickGame(event) {
            score += 100;
            document.getElementById('val').innerText = score;

            const words = ["+100 RIZZ", "SIGMA", "NO CAP", "AURA+", "W COOKING", "GOATED"];
            const txt = document.createElement("div");
            txt.className = "floating-text";
            txt.innerText = words[Math.floor(Math.random() * words.length)];
            
            // Center the text on the click
            txt.style.left = (event.clientX - 50) + "px";
            txt.style.top = event.clientY + "px";
            
            document.body.appendChild(txt);
            setTimeout(() => txt.remove(), 2000);
        }
    </script>
</body>
</html>
