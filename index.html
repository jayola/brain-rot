<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VOID | Brain-Rot Central</title>
    <style>
        :root { --bg: #00FF41; --btn: #FF00F5; --txt: #000000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Courier New', monospace; background: var(--bg); }

        /* The Iframe Window */
        #content-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; z-index: 1; }

        /* Landing Screen */
        #landing { position: absolute; z-index: 10; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); }
        .title { font-size: clamp(3rem, 15vw, 6rem); text-align: center; line-height: 0.8; color: white; text-shadow: 6px 6px 0px var(--txt); transform: rotate(-2deg); margin-bottom: 2rem; }

        /* Floating UI */
        #ui-layer { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; flex-direction: column; align-items: center; gap: 15px; pointer-events: none; }
        #void-btn { pointer-events: auto; background: var(--btn); color: white; padding: 20px 40px; font-size: 1.5rem; border: 5px solid var(--txt); box-shadow: 8px 8px 0px var(--txt); cursor: pointer; font-weight: 900; text-transform: uppercase; }
        #void-btn:active { box-shadow: 0px 0px 0px var(--txt); transform: translate(8px, 8px); }
        
        #counter-sticker { background: white; border: 3px solid black; padding: 5px 15px; box-shadow: 4px 4px 0px black; transform: rotate(3deg); font-weight: bold; pointer-events: auto; }
    </style>
</head>
<body>

    <div id="landing">
        <div class="title">NO<br>THOUGHTS</div>
        <div id="counter-sticker" style="margin-bottom: 20px;">BRAINCELLS LOST: <span id="count">0</span></div>
        <button id="void-btn" onclick="nextSite()">ENTER THE VOID</button>
    </div>

    <iframe id="content-frame" src=""></iframe>

    <div id="ui-layer" style="display: none;">
        <button id="void-btn" onclick="nextSite()">FEED THE ROT</button>
        <div id="counter-sticker">LOST: <span id="count-ui">0</span></div>
    </div>

    <script>
        let count = localStorage.getItem('braincells') || 0;
        document.getElementById('count').innerText = count;
        document.getElementById('count-ui').innerText = count;

        const sites = [
            "aura.html",
            "hit.html",
            "https://neal.fun/stimulation-clicker/",
            "https://pointerpointer.com/",
            "https://zzz.zoomquilt.org/",
            "https://longdogechallenge.com/",
            "https://puginarug.com/",
            "https://checkboxrace.com/",
            "https://onesquareminesweeper.com/"
        ];

        function nextSite() {
            count++;
            localStorage.setItem('braincells', count);
            document.getElementById('count').innerText = count;
            document.getElementById('count-ui').innerText = count;

            const pick = sites[Math.floor(Math.random() * sites.length)];
            
            document.getElementById('content-frame').src = pick;
            document.getElementById('content-frame').style.display = 'block';
            document.getElementById('landing').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'flex';
        }
    </script>
</body>
</html>
